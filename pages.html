<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | EduMentor AI</title>

<link rel="stylesheet" href="../style.css">

<style>
.dashboard{
    padding:40px;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.box{
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
    cursor:pointer;
}

.box:hover{
    transform:translateY(-5px);
}

.box h2{
    color:#4f46e5;
    margin-bottom:10px;
}

.progress{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
}

.bar{
    width:75%;
    height:100%;
    background:#4f46e5;
    border-radius:10px;
}
</style>

</head>
<body>

<header>
<h2>EduMentor AI Dashboard</h2>
</header>

<div class="dashboard">

<h1 class="title">Welcome Murali 👋</h1>

<div class="grid">

<div class="box">
<h2>📄 Resume Score</h2>
<h1>82%</h1>
<p>Your resume is good. Add more projects.</p>
</div>

<div class="box">
<h2>🛣 Career Progress</h2>

<div class="progress">
<div class="bar"></div>
</div>

<p>75% Completed</p>
</div>

<div class="box">
<h2>📚 Recommended Skills</h2>

<ul>
<li>React.js</li>
<li>Node.js</li>
<li>Firebase</li>
<li>Git & GitHub</li>
</ul>

</div>

<div class="box">
<h2>🎤 Interview Ready</h2>

<p>Practice Questions</p>

<button onclick="startInterview()">
Start Practice
</button>

</div>

</div>

</div>

<script>

function startInterview(){

alert("Interview Started 🚀");

}

</script>

</body>
</html>
